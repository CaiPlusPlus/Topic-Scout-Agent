name: Issue Autofix

on:
  issues:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to autofix"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  autofix:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'autofix')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Run autofix agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTOFIX_API_KEY: ${{ secrets.AUTOFIX_API_KEY }}
          AUTOFIX_MODEL: ${{ secrets.AUTOFIX_MODEL }}
          AUTOFIX_API_BASE: ${{ secrets.AUTOFIX_API_BASE }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/issue_autofix.py

